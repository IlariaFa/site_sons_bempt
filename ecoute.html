<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voiage de souvenirs à vapeur — écoute</title>
  <style>
    body { font-family: Helvetica, Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #111; line-height: 1.5; }
    h1 { font-size: 34px; line-height: 0.95; text-transform: uppercase; }
    h2 { margin-top: 40px; font-size: 20px; text-transform: uppercase; }
    label { display: block; margin: 10px 0; }
    button { margin: 25px 10px 25px 0; padding: 12px 16px; border: 1px solid #111; background: white; font-size: 16px; }
    audio { width: 100%; margin-top: 15px; }
    #nowPlaying { font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>

<h1>Voiage de souvenirs<br>à vapeur</h1>

<p>
Choisissez un ou plusieurs fragments. Les sons sélectionnés se joueront automatiquement les uns après les autres.
</p>

<h2>Vocalisations</h2>
<p>Fragments vocaux issus des ateliers. Chaque sélection compose une écoute différente.</p>

<label><input type="checkbox" value="sons/vocalisations/vocalisation-01.mp3" data-title="Vocalisation 01"> Vocalisation 01</label>
<label><input type="checkbox" value="sons/vocalisations/vocalisation-02.mp3" data-title="Vocalisation 02"> Vocalisation 02</label>
<label><input type="checkbox" value="sons/vocalisations/vocalisation-03.mp3" data-title="Vocalisation 03"> Vocalisation 03</label>

<button onclick="startPlaylist()">Écouter ma sélection</button>
<button onclick="selectAll()">Tout sélectionner</button>
<button onclick="clearAll()">Tout effacer</button>

<p id="nowPlaying"></p>
<audio id="player" controls></audio>

<script>
let playlist = [];
let currentIndex = 0;

function startPlaylist() {
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');

  playlist = Array.from(checked).map(item => ({
    src: item.value,
    title: item.dataset.title
  }));

  if (playlist.length === 0) {
    alert("Choisissez au moins un son.");
    return;
  }

  currentIndex = 0;
  playCurrent();
}

function playCurrent() {
  const player = document.getElementById("player");
  const nowPlaying = document.getElementById("nowPlaying");

  player.src = playlist[currentIndex].src;
  nowPlaying.textContent = "En écoute : " + playlist[currentIndex].title;
  player.play();
}

document.getElementById("player").addEventListener("ended", function () {
  currentIndex++;
  if (currentIndex < playlist.length) {
    playCurrent();
  } else {
    document.getElementById("nowPlaying").textContent = "Fin de la sélection.";
  }
});

function selectAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(item => item.checked = true);
}

function clearAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(item => item.checked = false);
}
</script>

</body>
</html>
