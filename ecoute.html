<button onclick="startPlaylist()">Écouter ma sélection</button>
<button onclick="selectAll()">Tout sélectionner</button>
<button onclick="clearAll()">Tout effacer</button>

<p id="nowPlaying"></p>
<audio id="player" controls></audio>

<script>
let playlist = [];
let currentIndex = 0;

function startPlaylist() {
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');

  playlist = Array.from(checked).map(item => ({
    src: item.value,
    title: item.dataset.title
  }));

  if (playlist.length === 0) {
    alert("Choisissez au moins un son.");
    return;
  }

  currentIndex = 0;
  playCurrent();
}

function playCurrent() {
  const player = document.getElementById("player");
  const nowPlaying = document.getElementById("nowPlaying");

  player.src = playlist[currentIndex].src;
  nowPlaying.textContent = "En écoute : " + playlist[currentIndex].title;
  player.play();
}

document.getElementById("player").addEventListener("ended", function () {
  currentIndex++;
  if (currentIndex < playlist.length) {
    playCurrent();
  } else {
    document.getElementById("nowPlaying").textContent = "Fin de la sélection.";
  }
});

function selectAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(item => item.checked = true);
}

function clearAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(item => item.checked = false);
}
</script>
